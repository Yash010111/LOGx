<!DOCTYPE html>
<html>
<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
<style> body {
  background: url("../static/bg3.webp") no-repeat;
  background-size: cover;
  display: grid;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;

  padding: 10px 30px;
  align-items: center;
  background-color: rgba(0, 0, 0, 0.4);

.nav-left {

}

.logo-icon {
  height: 30px;
  margin-right: 10px;
}

.logo-text {
  font-weight: 700;
  font-size: 20px;
  color: white;
}

.nav-center ul {
  display: flex;
  gap: 20px;
  list-style: none;
  padding: 0;
  margin: 0;
  
}
.nav-center{
 z-index: 99;
}
.nav-link {
  text-decoration: none;
  color: white;
  font-weight: 500;
  transition: color 0.2s ease;
}

.nav-link:hover {
  color: #ffdb6d;
}





.page-container {
  width: 60vw;
  border-radius: 5px;
  padding: 2rem;
  box-shadow: 0 0 1rem 0 rgba(0, 0, 0, .2);
  position: relative;
  z-index: 1;

  margin: 2rem auto;

textarea.log-input {

}

.generate-button {
  margin-top: 10px;
  padding: 12px 25px;
  background-color: #3e3e5a;
  color: white;
  font-weight: bold;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.generate-button:hover {
  background-color: #58587a;
}

.output-div {
  margin-top: 30px;
}

.pdf-button {
  display: inline-block;
  padding: 10px 20px;
  background-color: #262649;
  color: white;
  text-decoration: none;
  border-radius: 5px;
}

.page-container:before {
    content: '';
    position: absolute;
    top: -30vh;
    left: -30vh;
    right: -30vh;
    bottom: -30vh;
}

.page-container {
    width: 60vw;


    border-radius: 0;
    padding: 2rem;
  box-shadow: 0 0 1rem 0 rgba(0, 0, 0, .2); 
  border-radius: 5px;
  position: relative;
  z-index: 1;
  background: inherit;
  overflow: hidden;
}

.page-container:before {
  content: "";
  position: absolute;
  background: inherit;
  z-index: -1;

  box-shadow: inset 0 0 2000px rgba(255, 255, 255, .5);
filter: blur(2px); /* Was 10px */
  margin: -20px;
}
  
  
</style>
<!-- Loader -->
<div id="loader-overlay">
    <div id="container"></div>
    <div id="loader-text">Generating your AI report...</div>
</div>

<!-- Navbar -->
<div class="navbar">
    <div class="nav-left">
        <img src="{{ url_for('static', filename='icon.png') }}" alt="Logo Icon" class="logo-icon">
        <span class="logo-text">LOG.X</span>
    </div>

    <nav class="nav-center">
        <ul>
            <li><a href="/" class="nav-link">LOGX</a></li>
            <li ><a href="/report" class="nav-link">Report</a></li>
            <li ><a href="/visual" class="nav-link">Visual</a></li>
            <li ><a href="/about" class="nav-link">About</a></li>
        </ul>
        
    </nav>
  <div class="nav-right">
      <a href="#" class="nav-link">Help</a>
      <a href="#" class="nav-link">Logout</a>

  </div>
    


</div>

<!-- Main Content -->
<main class="page-container">
    <h1 class="main-heading">
        <div class="hero">
            <div class="glow-text" data-text="AI Network Crash / Hack Report.">
                AI Network Crash / Hack Report.
            </div>
        </div>
    </h1>

    <form method="POST" action="/report" onsubmit="showLoader()">
        <div class="input-container">
            <textarea name="log_input" placeholder="Paste all related logs here..." class="log-input" style="height: 300px;">{{ request.form.get("log_input") or "" }}</textarea>
            <button type="submit" class="generate-button">Generate Report</button>
        </div>
    </form>

    {% if result %}
        <script>document.getElementById('loader-overlay').style.display = 'none';</script>
        {% if result.error %}
            <p style="color: red;">{{ result.error }}</p>
        {% else %}
            <div class="output-div">
                <h3 style="margin-bottom: 10px;">Detailed AI Report</h3>
                <pre style="white-space: pre-wrap; font-family: monospace; background: #1f1f2e; color: #eee; padding: 20px; border-radius: 6px;">
{{ result.report }}
                </pre>
            </div>
            <div class="pdf-view-section" style="margin-top: 20px;">
                <a href="/report/pdf" target="_blank" class="pdf-button">Download Report as PDF</a>
            </div>
        {% endif %}
    {% endif %}
</main>

<!-- Scripts -->
<script>
function showSidebar() {
    document.querySelector('#sidebar').style.display = 'flex';
    document.querySelector('#sidebar').style.position = 'absolute'; // depending on your layout

    document.querySelector('#sidebar').style.zIndex = '9999999';

}
function hideSidebar() {
    document.querySelector('#sidebar').style.display = 'none';
}
function showLoader() {
    document.getElementById('loader-overlay').style.display = 'flex';
}

// Pixel animation script
const rand = (min, max) => Math.random() * (max - min) + min;
class Pixel {
    constructor(x, y, color, speed, delay, delayHide, step, boundSize) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.speed = rand(0.1, 0.9) * speed;
        this.size = 0;
        this.sizeStep = rand(0, 0.5);
        this.minSize = 0.5;
        this.maxSizeAvailable = boundSize || 2;
        this.maxSize = rand(this.minSize, this.maxSizeAvailable);
        this.sizeDirection = 1;
        this.delay = delay;
        this.delayHide = delayHide;
        this.counter = 0;
        this.counterHide = 0;
        this.counterStep = step;
        this.isHidden = false;
        this.isFlicking = false;
    }
    draw(ctx) {
        const offset = this.maxSizeAvailable * 0.5 - this.size * 0.5;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x + offset, this.y + offset, this.size, this.size);
    }
    show() {
        this.isHidden = false;
        this.counterHide = 0;
        if (this.counter <= this.delay) {
            this.counter += this.counterStep;
            return;
        }
        if (this.size >= this.maxSize) this.isFlicking = true;
        this.isFlicking ? this.flicking() : this.size += this.sizeStep;
    }
    hide() {
        this.counter = 0;
        if (this.counterHide <= this.delayHide) {
            this.counterHide += this.counterStep;
            if (this.isFlicking) this.flicking();
            return;
        }
        this.isFlicking = false;
        if (this.size <= 0) {
            this.size = 0;
            this.isHidden = true;
        } else {
            this.size -= 0.05;
        }
    }
    flicking() {
        this.sizeDirection = this.size >= this.maxSize ? -1 : this.size <= this.minSize ? 1 : this.sizeDirection;
        this.size += this.sizeDirection * this.speed;
    }
}

const canvas = document.createElement("canvas");
const container = document.querySelector("#container");
container.append(canvas);
const ctx = canvas.getContext("2d");

let width, height, pixels = [], request, lastTime;
let ticker = 0, maxTicker = 360, animationDirection = 1;

const getDelay = (x, y, invert) => {
    const dx = x - width / 2;
    const dy = invert ? y : y - height;
    return Math.sqrt(dx * dx + dy * dy);
}

const initPixels = () => {
    const h = Math.floor(rand(0, 360));
    const colors = Array.from({ length: 5 }, (_, i) =>
        `hsl(${Math.floor(rand(h, h + (i + 1) * 10))} 100% ${rand(50, 100)}%)`);
    const gap = 6, step = (width + height) * 0.005, speed = rand(0.008, 0.25), maxSize = Math.floor(gap * 0.5);
    pixels = [];

    for (let x = 0; x < width; x += gap) {
        for (let y = 0; y < height; y += gap) {
            if (x + maxSize > width || y + maxSize > height) continue;
            const color = colors[Math.floor(Math.random() * colors.length)];
            const delay = getDelay(x, y);
            const delayHide = getDelay(x, y);
            pixels.push(new Pixel(x, y, color, speed, delay, delayHide, step, maxSize));
        }
    }
}

const animate = () => {
    request = requestAnimationFrame(animate);
    const now = performance.now();
    const diff = now - (lastTime || 0);
    if (diff < 1000 / 60) return;
    lastTime = now - (diff % (1000 / 60));
    ctx.clearRect(0, 0, width, height);

    if (ticker >= maxTicker) animationDirection = -1;
    else if (ticker <= 0) animationDirection = 1;

    let allHidden = true;
    pixels.forEach(pixel => {
        animationDirection > 0 ? pixel.show() : pixel.hide();
        if (!pixel.isHidden) allHidden = false;
        pixel.draw(ctx);
    });

    ticker += animationDirection;
    if (animationDirection < 0 && allHidden) ticker = 0;
}

const resize = () => {
    cancelAnimationFrame(request);
    const rect = container.getBoundingClientRect();
    width = Math.floor(rect.width);
    height = Math.floor(rect.height);
    canvas.width = width;
    canvas.height = height;
    initPixels();
    ticker = 0;
    animate();
}

new ResizeObserver(resize).observe(container);
document.addEventListener('click', resize);
</script>

</body>
</html>
