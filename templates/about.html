<script type="module">
import { Pane } from "https://cdn.skypack.dev/tweakpane@4.0.4";
import gsap from "https://cdn.skypack.dev/gsap@3.12.0";
import { ScrollTrigger } from "https://cdn.skypack.dev/gsap@3.12.0/ScrollTrigger";

const config = {
  text: "We are dedicated to making complex logs simple, actionable, and insightful. Our Log Analyser helps individuals, developers, and organizations understand their systems by transforming raw log data into clear, structured intelligence.",
  theme: "system",
  hue: 320,
  saturation: 100,
  lightness: 50,
  speed: 0.8,
  show: false,
  unclip: false
};

const random = (min, max) =>
  Math.floor(
    Math.random() * (Math.floor(max) - Math.ceil(min) + 1) + Math.ceil(min)
  );

const trigger = document.querySelector("main section:first-of-type");
const headings = trigger.querySelectorAll("h2");
const spans = trigger.querySelectorAll("h2 span");

const ctrl = new Pane({
  title: "Config",
  expanded: true
});

const update = () => {
  for (const span of spans) {
    span.innerHTML = `${config.text} `;
  }
  trigger.style.setProperty("--text-length", config.text.length + 1);
  document.documentElement.style.setProperty("--cursor-hue", config.hue);
  document.documentElement.style.setProperty("--cursor-blink", config.speed);
  document.documentElement.style.setProperty(
    "--cursor-saturation",
    config.saturation
  );
  document.documentElement.style.setProperty(
    "--cursor-lightness",
    config.lightness
  );
  document.documentElement.dataset.theme = config.theme;
  document.documentElement.dataset.showLayers = config.show;
  document.documentElement.dataset.unclip = config.unclip;
};

const sync = (event) => {
  if (
    !document.startViewTransition ||
    event.target.controller.view.labelElement.innerText !== "Theme"
  )
    return update();
  document.startViewTransition(() => update());
};

const cursorFolder = ctrl.addFolder({ title: "Cursor", expanded: false });

cursorFolder.addBinding(config, "hue", {
  min: 0,
  max: 359,
  step: 1,
  label: "Hue"
});
cursorFolder.addBinding(config, "saturation", {
  min: 0,
  max: 100,
  step: 1,
  label: "Saturation"
});
cursorFolder.addBinding(config, "lightness", {
  min: 0,
  max: 100,
  step: 1,
  label: "Lightness"
});
cursorFolder.addBinding(config, "speed", {
  min: 0.1,
  max: 2,
  step: 0.01,
  label: "Blink (s)"
});

cursorFolder.addButton({ title: "Randomise" }).on("click", () => {
  config.hue = random(0, 359);
  config.saturation = random(0, 100);
  config.lightness = random(0, 100);
  ctrl.refresh();
});

ctrl.addBinding(config, "show", {
  label: "Show layers"
});
ctrl.addBinding(config, "unclip", {
  label: "Unclip layers"
});

ctrl.addBinding(config, "theme", {
  label: "Theme",
  options: {
    System: "system",
    Light: "light",
    Dark: "dark"
  }
});

ctrl.on("change", sync);
update();

const hasScrollSupport = CSS.supports(
  "(animation-timeline: view()) and (animation-range: 0 100%)"
);
if (!hasScrollSupport) {
  gsap.registerPlugin(ScrollTrigger);
  console.info("registered GSAP ScrollTrigger");
  // const trigger = document.querySelector('main section:first-of-type')
  const text = trigger.querySelector("blockquote");
  gsap.fromTo(
    text,
    {
      "--idx": 0
    },
    {
      "--idx": config.text.length + 1,
      duration: 1,
      ease: `steps(${config.text.length + 1})`,
      scrollTrigger: {
        trigger,
        scrub: 0.2,
        start: "top top",
        end: "bottom bottom",
        onUpdate: (self) => {
          text.style.setProperty("--velocity", Math.abs(self.getVelocity()));
        },
        onScrubComplete: () => text.style.setProperty("--velocity", 0)
      }
    }
  );
}
</script>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"><style>@import url("https://fonts.googleapis.com/css2?family=Reddit+Mono:wght@200..900&display=swap");
@import url("https://unpkg.com/normalize.css") layer(normalize);
/* @import 'normalize.css' layer(normalize); */
@layer normalize, base, demo, layers;

@layer layers {
  :root {
    --move: 0.5s;
    --clip: text;
  }
  body {
    overflow-x: hidden;
  }
  [data-unclip="true"] {
    --clip: border-box;
  }
  blockquote {
    --step: 200px;
    transform-style: preserve-3d;
    transition: transform var(--move) var(--move);

    h2:nth-of-type(1) {
      transition: opacity var(--move) var(--move);
    }
  }
  blockquote [aria-hidden] {
    position: absolute;
  }

  blockquote h2::after {
    position: absolute;
    opacity: 0;
    top: 50%;
    left: calc(100% + 2ch);
    translate: 0 -50%;
    transition: opacity var(--move);
  }

  blockquote h2:nth-of-type(1)::after {
    content: "Result";
  }
  blockquote h2:nth-of-type(2)::after {
    content: "Quote layer";
  }
  blockquote h2:nth-of-type(3)::after {
    content: "Author layer";
  }
  blockquote h2:nth-of-type(4)::after {
    content: "Cursor layer";
  }

  blockquote [aria-hidden] {
    outline: 0.1em dashed #0000;
    outline-offset: 0.1em;
    opacity: 0;
    transform-style: preserve-3d;
    transition-property: transform, outline-color, opacity;
    transition-duration: var(--move);
    transition-delay: 0;
  }

  [data-show-layers="true"] {
    blockquote {
      transform: rotateX(-30deg) rotateY(-32deg)
        translate3d(0, calc(var(--step) * 1.5), 0) rotateX(90deg);
      transition: transform var(--move);
    }

    blockquote h2::after {
      opacity: 1;
      transition: opacity var(--move) var(--move);
    }

    h2:nth-of-type(1) {
      opacity: 0.5;
      transition: opacity var(--move);
    }

    [aria-hidden] {
      outline-color: canvasText;
      opacity: 1;
      transform: translate3d(0, 0, calc(var(--depth, 0) * var(--step)));
      transition-property: transform, outline-color, opacity;
      transition-duration: var(--move);
      transition-delay: var(--move);
    }

    [aria-hidden]:nth-of-type(2) {
      --depth: 1;
      span {
        background: linear-gradient(canvasText 0 0) 0 0 /
          calc(min(var(--position), var(--text-length) - 13) * 1ch) 100%
          no-repeat var(--clip) !important;
      }
    }
    [aria-hidden]:nth-of-type(3) {
      --depth: 2;
      span {
        background: linear-gradient(
            color-mix(in hsl, canvasText, #0000 25%) 0 0
          )
          calc((var(--text-length) - 13) * 1ch) 0 /
          calc((var(--position) - (var(--text-length) - 13)) * 1ch) 100%
          no-repeat var(--clip) !important;
      }
    }
    [aria-hidden]:nth-of-type(4) {
      --depth: 3;
      span {
        background: linear-gradient(
            hsl(
                var(--cursor-hue) calc(var(--cursor-saturation) * 1%)
                  calc(var(--cursor-lightness) * 1%) /
                  calc(var(--alpha) + var(--velocity))
              )
              0 0
          )
          calc((var(--position) + 0.05) * 1ch) 50% / 0.95ch 1lh no-repeat
          border-box !important;
      }
    }
  }
}

@layer animation {
  :root {
    --cursor-hue: 320;
    --cursor-saturation: 100;
    --cursor-lightness: 50;
  }
  @property --idx {
    syntax: "<number>";
    inherits: true;
    initial-value: 0;
  }
  @property --alpha {
    syntax: "<number>";
    inherits: true;
    initial-value: 0;
  }
  @property --scrub {
    initial-value: 0;
    inherits: true;
    syntax: "<number>";
  }
  @property --velocity {
    initial-value: 0;
    inherits: true;
    syntax: "<number>";
  }

  @supports (animation-timeline: view()) and (animation-range: 0 100%) {
    main section:first-of-type {
      view-timeline: --header;
    }
    h2 span {
      --velocity: round(
        up,
        clamp(
          0,
          max(
            calc(var(--idx) - var(--scrub)),
            calc(-1 * (var(--idx) - var(--scrub)))
          ),
          1
        ),
        1
      );
      animation-timeline: --header;
      animation-range: exit-crossing 0% entry-crossing 100%;
    }

    h2 {
      animation: index both steps(calc(var(--text-length) + 0));
      animation-timeline: --header;
      animation-range: exit-crossing 0% entry-crossing 100%;
    }
  }

  h2 span {
    --position: min(var(--idx), var(--text-length) - 1);
    white-space: break-spaces;
    background: linear-gradient(
          hsl(
              var(--cursor-hue) calc(var(--cursor-saturation) * 1%)
                calc(var(--cursor-lightness) * 1%) /
                calc(var(--alpha) + var(--velocity))
            )
            0 0
        )
        calc((var(--position) + 0.05) * 1ch) 50% / 0.95ch 1lh no-repeat
        border-box,
      linear-gradient(canvasText 0 0) 0 0 /
        calc(min(var(--position), var(--text-length) - 13) * 1ch) 100% no-repeat
        var(--clip),
      linear-gradient(color-mix(in hsl, canvasText, #0000 25%) 0 0)
        calc((var(--text-length) - 13) * 1ch) 0 /
        calc((var(--position) - (var(--text-length) - 13)) * 1ch) 100% no-repeat
        var(--clip);
    color: transparent;
    transition: --scrub 0.2s;
  }
  :root {
    animation: blink calc(var(--cursor-blink, 0.8) * 1s) infinite;
  }
  @keyframes blink {
    50% {
      --alpha: 1;
    }
  }
  @keyframes index {
    to {
      --idx: var(--text-length);
      --scrub: var(--text-length);
    }
  }
}

  h1,

  h1::after {

      var(--cursor-hue) calc(var(--cursor-saturation) * 1%)

  main blockquote {
    position: sticky;
    top: 0;
    min-height: 100vh;
    display: flex;
    place-items: center;
    margin: 0;
    justify-content: center;
  }
}

@layer base {
  :root {
    --font-size-min: 16;
    --font-size-max: 20;
    --font-ratio-min: 1.2;
    --font-ratio-max: 1.33;
    --font-width-min: 375;
    --font-width-max: 1500;
  }

  html {
    color-scheme: light dark;
  }

  [data-theme="light"] {
    color-scheme: light only;
  }

  [data-theme="dark"] {
    color-scheme: dark only;
  }

  :where(.fluid) {
    --fluid-min: calc(
      var(--font-size-min) * pow(var(--font-ratio-min), var(--font-level, 0))
    );
    --fluid-max: calc(
      var(--font-size-max) * pow(var(--font-ratio-max), var(--font-level, 0))
    );
    --fluid-preferred: calc(
      (var(--fluid-max) - var(--fluid-min)) /
        (var(--font-width-max) - var(--font-width-min))
    );
    --fluid-type: clamp(
      (var(--fluid-min) / 16) * 1rem,
      ((var(--fluid-min) / 16) * 1rem) -
        (((var(--fluid-preferred) * var(--font-width-min)) / 16) * 1rem) +
        (var(--fluid-preferred) * var(--variable-unit, 100vi)),
      (var(--fluid-max) / 16) * 1rem
    );
    font-size: round(var(--fluid-type), 0.1rem);
  }

  *,
  *:after,
  *:before {
    box-sizing: border-box;
  }

  body {
    background: light-dark(white, black);
    font-family: "SF Pro Text", "SF Pro Icons", "AOS Icons", "Helvetica Neue",
      Helvetica, Arial, sans-serif, system-ui;
  }

  body::before {
    --size: 45px;
    --line: color-mix(in lch, canvasText, transparent 70%);
    content: "";
    height: 100vh;
    width: 100vw;
    position: fixed;
    background: linear-gradient(
          90deg,
          var(--line) 1px,
          transparent 1px var(--size)
        )
        50% 50% / var(--size) var(--size),
      linear-gradient(var(--line) 1px, transparent 1px var(--size)) 50% 50% /
        var(--size) var(--size);
    mask: linear-gradient(-20deg, transparent 50%, white);
    top: 0;
    transform-style: flat;
    pointer-events: none;
    z-index: -1;
  }

  .bear-link {
    color: canvasText;
    position: fixed;
    top: 1rem;
    left: 1rem;
    width: 48px;
    aspect-ratio: 1;
    display: grid;
    place-items: center;
    opacity: 0.8;
  }

  :where(.x-link, .bear-link):is(:hover, :focus-visible) {
    opacity: 1;
  }

  .bear-link svg {
    width: 75%;
  }

  /* Utilities */
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border-width: 0;
  }
}
